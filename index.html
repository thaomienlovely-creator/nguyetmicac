<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyệt Mi Các | La Coquette Écrivain</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --soft-pink: #fdf0f2;
            --ribbon-pink: #ffc0cb;
            --vintage-rose: #b57a84;
            --cream-silk: #fffaf5;
            --lace-white: #ffffff;
            --text-sepia: #5d4a4a;
            --admin-gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--soft-pink);
            color: var(--text-sepia);
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/cream-pixels.png');
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
        .cursive { font-family: 'Pinyon Script', cursive; }

        .decoration-flower {
            position: fixed; font-size: 1.2rem; color: var(--ribbon-pink);
            z-index: -1; pointer-events: none; opacity: 0.6;
        }

        #hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('https://images.unsplash.com/photo-1516054133989-13e648c68832?q=80&w=2000');
            background-size: cover; background-position: center; text-align: center;
        }

        .hero-box {
            background: rgba(255, 255, 255, 0.85); padding: 50px 80px;
            border: 2px solid var(--ribbon-pink); outline: 5px solid rgba(255, 192, 203, 0.3);
            border-radius: 2px; position: relative;
        }

        .hero-title { font-size: 4rem; color: var(--vintage-rose); margin-bottom: 10px; }
        .btn-open {
            margin-top: 30px; padding: 12px 40px; background: var(--vintage-rose);
            color: white; border: none; border-radius: 25px; font-family: 'Playfair Display', serif;
            font-style: italic; cursor: pointer; transition: 0.3s;
        }
        .btn-open:hover { transform: scale(1.05); letter-spacing: 2px; }

        #main-app { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; animation: fadeIn 1s; }
        
        .header-app { text-align: center; margin-bottom: 50px; }
        .category-container { display: flex; gap: 20px; justify-content: center; margin-bottom: 40px; }
        
        .cat-btn {
            background: var(--lace-white); border: 1px solid var(--ribbon-pink);
            padding: 15px 30px; border-radius: 15px; font-family: 'Playfair Display', serif;
            font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { background: var(--ribbon-pink); color: white; transform: translateY(-5px); }

        .novel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .novel-card {
            background: var(--cream-silk); padding: 30px; border-radius: 10px;
            border: 1px solid var(--ribbon-pink); text-align: center; cursor: pointer;
            position: relative; transition: 0.3s;
        }
        .novel-card:hover { box-shadow: 0 10px 25px rgba(181, 122, 132, 0.2); }
        .novel-card::after { content: '🎀'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; }

        .back-nav { color: var(--vintage-rose); cursor: pointer; display: inline-block; margin-bottom: 20px; font-weight: 600; }
        
        .writer-panel {
            background: var(--lace-white); padding: 50px; border-radius: 5px;
            box-shadow: 0 0 40px rgba(0,0,0,0.05); border-left: 8px solid var(--ribbon-pink);
        }
        .chapter-input {
            width: 100%; border: none; border-bottom: 1px dashed var(--ribbon-pink);
            font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 30px; outline: none;
        }
        .content-area {
            width: 100%; min-height: 500px; border: none; outline: none;
            font-size: 1.15rem; line-height: 2; text-align: justify; background: transparent; resize: none;
        }

        /* Thêm style cho phần giới thiệu */
        .synopsis-box {
            background: var(--lace-white); padding: 40px; border-radius: 15px;
            border: 1px solid var(--ribbon-pink); line-height: 1.8; text-align: center;
        }

        .comment-section { margin-top: 50px; border-top: 2px dashed var(--ribbon-pink); padding-top: 30px; }
        .comment-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .comment-form input, .comment-form textarea {
            padding: 10px; border: 1px solid var(--ribbon-pink); border-radius: 10px; outline: none; font-family: 'Quicksand', sans-serif;
        }
        .comment-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--ribbon-pink); }

        .admin-controls { margin-top: 10px; display: flex; gap: 5px; justify-content: center; }
        .btn-small { font-size: 0.7rem; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; background: #eee; }
        .btn-del { background: #ffdada; color: #cc5555; }

        #admin-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-box {
            background: var(--soft-pink); padding: 30px; border-radius: 20px;
            width: 350px; text-align: center; border: 3px solid var(--ribbon-pink);
        }
        .modal-box input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid var(--ribbon-pink); outline: none; text-align: center;
        }

        .admin-trigger {
            position: fixed; bottom: 30px; right: 30px; font-size: 3rem; cursor: pointer; transition: 0.3s; z-index: 999;
        }
        .admin-badge {
            background: var(--vintage-rose); color: white; padding: 2px 10px; border-radius: 5px;
            font-size: 0.7rem; position: absolute; top: 20px; right: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <section id="hero">
        <div class="hero-box">
            <span class="cursive" style="font-size: 2.5rem; color: var(--ribbon-pink);">Bienvenue à</span>
            <h1 class="hero-title">Nguyệt Mi Các</h1>
            <p style="letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem;">Góc nhỏ của những tâm hồn mộng mơ</p>
            <button class="btn-open" onclick="startApp()">MỞ TRANG SÁCH</button>
        </div>
    </section>

    <main id="main-app">
        <div id="admin-indicator" class="admin-badge" style="display: none;">CHẾ ĐỘ QUẢN TRỊ</div>
        
        <header class="header-app">
            <div class="cursive" style="font-size: 3rem; color: var(--ribbon-pink);">Nguyệt Mi Các</div>
            <div class="category-container">
                <button class="cat-btn active" id="btn-meo-lon" onclick="switchCategory('meo-lon')">Mèo lớn 🐈</button>
                <button class="cat-btn" id="btn-meo-dang-lon" onclick="switchCategory('meo-dang-lon')">Mèo đang lớn 🐾</button>
            </div>
            <div id="admin-tools-top" style="display: none;">
                <button class="btn-open" style="padding: 8px 20px;" onclick="addNovel()">+ Thêm truyện</button>
                <button id="master-btn" class="btn-open" style="padding: 8px 20px; background: var(--admin-gold); display: none;" onclick="addAdminPass()">+ Thêm mật khẩu</button>
            </div>
        </header>

        <div id="view-library" class="novel-grid"></div>

        <div id="view-description" style="display: none; max-width: 800px; margin: 0 auto;">
            <div class="back-nav" onclick="goBack('library')">← Trở về tủ mèo</div>
            <div class="synopsis-box">
                <h2 id="desc-title" style="margin-bottom: 20px; color: var(--vintage-rose);"></h2>
                <div id="desc-content" style="white-space: pre-wrap; margin-bottom: 30px; text-align: justify;"></div>
                <button class="btn-open" onclick="showChaptersFromDesc()">ĐỌC TRUYỆN</button>
                <button id="edit-desc-btn" class="btn-open" style="display: none; background: var(--text-sepia);" onclick="editDescription()">Sửa giới thiệu</button>
            </div>
        </div>

        <div id="view-chapters" style="display: none;">
            <div class="back-nav" onclick="goBack('description')">← Xem lại giới thiệu</div>
            <h2 id="display-novel-title" style="margin-bottom: 30px; font-style: italic;"></h2>
            <div id="chapter-list-container" class="novel-grid"></div>
            <button id="add-chapter-btn" class="btn-open" style="display: none; margin-top: 30px;" onclick="addChapter()">+ Viết chương mới</button>
        </div>

        <div id="view-editor" style="display: none;">
            <div class="back-nav" onclick="goBack('chapters')">← Trở về mục lục</div>
            <div class="writer-panel">
                <input type="text" id="chapter-title-field" class="chapter-input" placeholder="Tiêu đề chương...">
                <textarea id="chapter-content-field" class="content-area" placeholder="Bắt đầu viết áng văn của bạn..."></textarea>
                <button id="save-btn" class="btn-open" style="display: none; float: right;" onclick="saveCurrentChapter()">LƯU TÁC PHẨM</button>
                <div style="clear: both;"></div>
            </div>

            <div class="comment-section">
                <h3 style="margin-bottom: 20px; color: var(--vintage-rose);">Bình luận của người đọc 🎀</h3>
                <div class="comment-form">
                    <input type="text" id="cmt-name" placeholder="Tên của bạn...">
                    <textarea id="cmt-content" placeholder="Cảm nhận của bạn về chương này..." style="min-height: 80px;"></textarea>
                    <button class="btn-open" style="margin-top: 0; padding: 10px;" onclick="postComment()">Gửi bình luận</button>
                </div>
                <div id="comments-display"></div>
            </div>
        </div>
    </main>

    <div class="admin-trigger" onclick="openAdminModal()">🎀</div>

    <div id="admin-modal">
        <div class="modal-box">
            <h3 class="cursive" style="font-size: 2rem;">Chìa khóa các</h3>
            <input type="password" id="admin-password" placeholder="Nhập mật khẩu...">
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn-open" style="margin: 0; padding: 10px 20px;" onclick="checkAdmin()">XÁC NHẬN</button>
                <button class="btn-open" style="margin: 0; padding: 10px 20px; background: #999;" onclick="closeAdminModal()">ĐỌC TRUYỆN</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            isAdmin: false,
            isMaster: false,
            currentCat: 'meo-lon',
            currentNovelIdx: null,
            currentChapterIdx: null,
            data: JSON.parse(localStorage.getItem('nguyet_mi_cac_data')) || {
                'meo-lon': [],
                'meo-dang-lon': [],
                'admin_passwords': ["18062010"]
            }
        };

        function startApp() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderLibrary();
        }

        function switchCategory(cat) {
            state.currentCat = cat;
            document.getElementById('btn-meo-lon').classList.toggle('active', cat === 'meo-lon');
            document.getElementById('btn-meo-dang-lon').classList.toggle('active', cat === 'meo-dang-lon');
            renderLibrary();
        }

        function openAdminModal() { document.getElementById('admin-modal').style.display = 'flex'; }
        function closeAdminModal() { document.getElementById('admin-modal').style.display = 'none'; }
        
        function checkAdmin() {
            const pass = document.getElementById('admin-password').value;
            const allowedPass = state.data.admin_passwords || ["18062010"];
            
            if(allowedPass.includes(pass)) {
                state.isAdmin = true;
                if(pass === "18062010") {
                    state.isMaster = true;
                    document.getElementById('master-btn').style.display = 'inline-block';
                }
                document.getElementById('admin-indicator').style.display = 'block';
                document.getElementById('admin-tools-top').style.display = 'block';
                document.getElementById('add-chapter-btn').style.display = 'inline-block';
                document.getElementById('edit-desc-btn').style.display = 'inline-block';
                document.getElementById('save-btn').style.display = 'block';
                alert("Chào mừng Admin! 🌸");
                closeAdminModal();
                renderLibrary();
            } else {
                alert("Mật khẩu không đúng.");
            }
        }

        function addAdminPass() {
            if(!state.isMaster) return;
            const newPass = prompt("Nhập mật khẩu admin phụ muốn thêm:");
            if(newPass) {
                if(!state.data.admin_passwords) state.data.admin_passwords = ["18062010"];
                state.data.admin_passwords.push(newPass);
                saveData();
                alert("Đã thêm mật khẩu mới thành công!");
            }
        }

        function saveData() { localStorage.setItem('nguyet_mi_cac_data', JSON.stringify(state.data)); }

        function renderLibrary() {
            const container = document.getElementById('view-library');
            container.innerHTML = '';
            const list = state.data[state.currentCat];

            list.forEach((novel, idx) => {
                if(!state.isAdmin && novel.isPrivate) return;

                const card = document.createElement('div');
                card.className = 'novel-card';
                let statusIcon = novel.isPrivate ? '🔒' : '🌍';
                card.innerHTML = `
                    <h3>${novel.title}</h3>
                    <p style="font-size:0.7rem; color:var(--vintage-rose)">${statusIcon} | ${novel.chapters.length} chương</p>
                `;
                
                if(state.isAdmin) {
                    const controls = document.createElement('div');
                    controls.className = 'admin-controls';
                    controls.innerHTML = `
                        <button class="btn-small" onclick="event.stopPropagation(); editNovel(${idx})">Sửa tên</button>
                        <button class="btn-small" onclick="event.stopPropagation(); togglePrivacy(${idx})">${novel.isPrivate ? 'Mở' : 'Khóa'}</button>
                        <button class="btn-small btn-del" onclick="event.stopPropagation(); deleteNovel(${idx})">Xóa</button>
                    `;
                    card.appendChild(controls);
                }

                card.onclick = () => openNovel(idx);
                container.appendChild(card);
            });
            document.getElementById('view-library').style.display = 'grid';
            document.getElementById('view-description').style.display = 'none';
            document.getElementById('view-chapters').style.display = 'none';
            document.getElementById('view-editor').style.display = 'none';
        }

        // Logic MỚI: Mở giới thiệu truyện trước
        function openNovel(idx) {
            state.currentNovelIdx = idx;
            const novel = state.data[state.currentCat][idx];
            
            document.getElementById('desc-title').innerText = novel.title;
            document.getElementById('desc-content').innerText = novel.description || "Chưa có lời giới thiệu cho áng văn này...";
            
            document.getElementById('view-library').style.display = 'none';
            document.getElementById('view-description').style.display = 'block';
            
            // Hiện nút sửa giới thiệu nếu là admin
            document.getElementById('edit-desc-btn').style.display = state.isAdmin ? 'inline-block' : 'none';
        }

        function editDescription() {
            const novel = state.data[state.currentCat][state.currentNovelIdx];
            const newDesc = prompt("Nhập nội dung giới thiệu truyện:", novel.description || "");
            if(newDesc !== null) {
                novel.description = newDesc;
                saveData();
                document.getElementById('desc-content').innerText = newDesc;
            }
        }

        function showChaptersFromDesc() {
            const novel = state.data[state.currentCat][state.currentNovelIdx];
            document.getElementById('display-novel-title').innerText = novel.title;
            renderChapters();
            document.getElementById('view-description').style.display = 'none';
            document.getElementById('view-chapters').style.display = 'block';
        }

        function renderChapters() {
            const container = document.getElementById('chapter-list-container');
            container.innerHTML = '';
            const novel = state.data[state.currentCat][state.currentNovelIdx];
            novel.chapters.forEach((ch, idx) => {
                const card = document.createElement('div');
                card.className = 'novel-card';
                card.innerHTML = `<h4 style="font-size:1rem">${ch.title}</h4>`;
                if(state.isAdmin) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn-small btn-del';
                    delBtn.style.marginTop = "10px";
                    delBtn.innerText = "Xóa chương";
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteChapter(idx); };
                    card.appendChild(delBtn);
                }
                card.onclick = () => openChapter(idx);
                container.appendChild(card);
            });
        }

        function deleteChapter(idx) {
            if(confirm("Xóa chương này?")) {
                state.data[state.currentCat][state.currentNovelIdx].chapters.splice(idx, 1);
                saveData(); renderChapters();
            }
        }

        function openChapter(idx) {
            state.currentChapterIdx = idx;
            const ch = state.data[state.currentCat][state.currentNovelIdx].chapters[idx];
            document.getElementById('chapter-title-field').value = ch.title;
            document.getElementById('chapter-content-field').value = ch.content;
            document.getElementById('chapter-title-field').readOnly = !state.isAdmin;
            document.getElementById('chapter-content-field').readOnly = !state.isAdmin;
            renderComments();
            document.getElementById('view-chapters').style.display = 'none';
            document.getElementById('view-editor').style.display = 'block';
        }

        function saveCurrentChapter() {
            const title = document.getElementById('chapter-title-field').value;
            const content = document.getElementById('chapter-content-field').value;
            state.data[state.currentCat][state.currentNovelIdx].chapters[state.currentChapterIdx].title = title;
            state.data[state.currentCat][state.currentNovelIdx].chapters[state.currentChapterIdx].content = content;
            saveData(); alert("Đã lưu!");
        }

        function addNovel() {
            const title = prompt("Tên truyện mới:");
            if(title) {
                state.data[state.currentCat].push({ title, description: "", chapters: [], isPrivate: false });
                saveData(); renderLibrary();
            }
        }

        function addChapter() {
            const title = prompt("Tên chương mới:");
            if(title) {
                state.data[state.currentCat][state.currentNovelIdx].chapters.push({ title, content: "", comments: [] });
                saveData(); renderChapters();
            }
        }

        function postComment() {
            const name = document.getElementById('cmt-name').value || "Người đọc giấu tên";
            const content = document.getElementById('cmt-content').value;
            if(!content) return alert("Nàng chưa viết gì cả...");
            
            if(!state.data[state.currentCat][state.currentNovelIdx].chapters[state.currentChapterIdx].comments) {
                state.data[state.currentCat][state.currentNovelIdx].chapters[state.currentChapterIdx].comments = [];
            }
            
            state.data[state.currentCat][state.currentNovelIdx].chapters[state.currentChapterIdx].comments.push({ name, content, date: new Date().toLocaleDateString() });
            saveData();
            document.getElementById('cmt-content').value = '';
            renderComments();
        }

        function renderComments() {
            const container = document.getElementById('comments-display');
            container.innerHTML = '';
            const cmts = state.data[state.currentCat][state.currentNovelIdx].chapters[state.currentChapterIdx].comments || [];
            cmts.slice().reverse().forEach(c => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `<strong>${c.name}</strong> <small style="color:#aaa">(${c.date})</small><br><p style="margin-top:5px">${c.content}</p>`;
                container.appendChild(div);
            });
        }

        function goBack(target) {
            const views = ['view-library', 'view-description', 'view-chapters', 'view-editor'];
            views.forEach(v => document.getElementById(v).style.display = 'none');
            
            if(target === 'library') {
                renderLibrary();
                document.getElementById('view-library').style.display = 'grid';
            } else if (target === 'description') {
                document.getElementById('view-description').style.display = 'block';
            } else if (target === 'chapters') {
                renderChapters();
                document.getElementById('view-chapters').style.display = 'block';
            }
        }

        // Tạo hoa trang trí
        for(let i=0; i<15; i++) {
            let flower = document.createElement('div');
            flower.className = 'decoration-flower';
            flower.innerHTML = i % 2 === 0 ? '🌸' : '🎀';
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(flower);
        }
    </script>
</body>
</html>
